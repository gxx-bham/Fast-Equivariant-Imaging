config_name: ct_fei_o2
task: ct
method: FEI-O2
seed: 0
device: cuda:0
dataset:
  name: CT100
  path: CT/CT100_128x128.mat
  split_policy: first90_last10
  train_samples: 90
  val_samples: 0
  test_samples: 10
physics:
  operator: ct
  radon_view: 50
  circle: false
transform:
  name: rotate
  n_trans: 5
  random_rotate: true
model:
  name: UNet
  in_channels: 1
  out_channels: 1
  compact: 4
  residual: true
  circular_padding: true
  cat: true
train:
  epochs: 5000
  batch_size: 8
  optimizer: Adam
  lr_G: 0.001
  weight_decay: 1.0e-08
  schedule:
    - 1000
    - 2000
    - 3000
  loss_type: l2
  ckp_interval: 5000
  validation_interval: 0
  snapshot_epochs:
    - 100
    - 300
    - 500
    - 1000
    - 1500
    - 2000
    - 3000
    - 4000
    - 5000
method_settings:
  alpha: 1000
  lambda: 1
  beta: 0.1
  eta: 0.01
  J: 10
selection:
  checkpoint_selection_metric: final_epoch
  evaluation_checkpoint: final_model.pth.tar
  early_stopping_metric: none
output:
  root_dir: outputs
  save_resolved_config: true
  save_environment_info: true
  save_git_info: true
  save_run_metadata: true
  track_training_wall_clock: true
  save_eval_runtime_summary: false
